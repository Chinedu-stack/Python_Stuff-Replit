{% extends "base.html" %}

{% block content %}
    <div class="parent-container1">

        <div class="title-2">
            <h3>All Tasks:</h3>
        </div>
        <div class="tasks">
            {% if tasks %}
                {% for task in tasks %}
                    {% if not task["is_done"]%}
                        <p>{{loop.index}}:        {{task["task"]}}</p>
                        <form method="POST" action="/mark_done_all">
                            <input type="hidden" name="task" value="{{task["task"]}}">
                            <button type="submit" class="mark_done">Mark Done</button>
                        </form>
                    {% else %}
                        <p class="completed">{{loop.index}}:        {{task["task"]}} ✅</p>
                    {% endif %}
                {% endfor %}
            {% else %}
                <p>No tasks for today.</p>
            {% endif %}
        </div>

        <div class="child-container-button" >
            <form action="/logout" method="POST">
                <button class="btn" type="submit">Logout</button>
            </form>
        </div>

        <div class="child-container-button">
            <form action="/add_task" method="POST">
                <button class="btn" type="submit">Add Task</button>
            </form>
        </div>

        <div class="child-container-button">
            <form action="/delete_task" method="POST">
                <button class="btn" type="submit">Delete Task</button>
            </form>
        </div>

        <div class="child-container_button">
            <form action="/delete_account" method="POST">
                <button class="btn" type="submit">Delete Account</button>
            </form>
        </div>

        <div class="child-container-button">
            <form action="/post_dashboard" method="POST">
                <button class="btn" type="submit">Show Today's Tasks</button>
            </form>
        </div>
    </div>
{% endblock %}
